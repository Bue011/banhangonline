<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - Quản lý đơn hàng</title>
<style>
    #loginBox {
    max-width: 300px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 8px;
}

#loginBox input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 30px;
}
h1 { margin-bottom: 20px; }

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}
th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: left;
}
th {
    background: #333;
    color: white;
}
.total-box {
    margin: 20px 0;
    font-size: 18px;
    font-weight: bold;
}
button {
    padding: 10px 15px;
    margin-bottom: 20px;
}
</style>
</head>
<body>
<div id="loginBox">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Nhập mật khẩu">
    <button onclick="login()">Đăng nhập</button>
</div>

<div id="adminContent" style="display:none;">
    <!-- TOÀN BỘ NỘI DUNG ADMIN CŨ ĐỂ TRONG ĐÂY -->
</div>
<h1>📦 Quản lý đơn hàng</h1>

<button onclick="loadOrders()">Refresh</button>

<div class="total-box" id="totalRevenue">
Tổng doanh thu: 0đ
</div>

<table id="orderTable">
<thead>
<tr>
<th>Thời gian</th>
<th>Sản phẩm</th>
<th>Tên</th>
<th>SĐT</th>
<th>Địa chỉ</th>
<th>Tổng</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
    const ADMIN_PASSWORD = "123456"; // đổi mật khẩu ở đây

function login() {
    const input = document.getElementById("adminPass").value;
    if (input === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
    } else {
        alert("Sai mật khẩu!");
    }
}
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpg_fa526QA7HESOimJE5eRu8WqG8MnoGjLGtQjf-E-YyNvqo8sXse0NocxlmwAxBIwrj7bnbLyh0G/pub?output=csv";

async function loadOrders() {
    const response = await fetch(sheetURL);
    const data = await response.text();
    const rows = data.split("\n").slice(1);

    const tbody = document.querySelector("#orderTable tbody");
    tbody.innerHTML = "";

    let totalRevenue = 0;

    rows.forEach(row => {
        const cols = row.split(",");

        if(cols.length > 5) {
            const total = parseInt(cols[6]) || 0;
            totalRevenue += total;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${cols[0]}</td>
                <td>${cols[1]}</td>
                <td>${cols[2]}</td>
                <td>${cols[3]}</td>
                <td>${cols[4]}</td>
                <td>${total.toLocaleString()}đ</td>
            `;
            tbody.appendChild(tr);
        }
    });

    document.getElementById("totalRevenue").innerText =
        "Tổng doanh thu: " + totalRevenue.toLocaleString() + "đ";
}

loadOrders();
</script>

</body>
</html>
