<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Soul - Thời trang cổ điển</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://provinces.open-api.vn/api/?depth=3">
    
</head>
<body>

    <header>
        <nav>
    <div class="logo">VINTAGE SOUL</div>
    <ul class="nav-links">
        <li><a href="#">Nam</a></li>
        <li><a href="#">Nữ</a></li>
        <li><a href="#" id="cart-icon">Giỏ hàng (<span id="cart-count">0</span>)</a></li>
    </ul>
</nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Timeless Elegance</h1>
            <p>Khám phá phong cách hoài cổ qua từng đường kim mũi chỉ.</p>
            <a href="#" class="btn">Mua Ngay</a>
        </div>
    </section>

    <section class="products">
    <h2>Sản phẩm mới nhất</h2>
    <div class="product-grid">
        <div class="product-item" data-id="1" data-name="Áo Blazer Dạ" data-price="950000">
            <img src="hinhanh/ao blaze dạ.avif" alt="Áo Blazer Dạ">
            <h4>Áo Blazer Dạ</h4>
            <p class="price">950,000đ</p>
            <button class="add-to-cart">Thêm vào giỏ</button>
        </div>

        <div class="product-item" data-id="2" data-name="Váy Lụa Retro" data-price="1200000">
            <img src="hinhanh/vay lụa retro.avif" alt="Váy Lụa Retro">
            <h4>Váy Lụa Retro</h4>
            <p class="price">1,200,000đ</p>
            <button class="add-to-cart">Thêm vào giỏ</button>
        </div>

        <div class="product-item" data-id="3" data-name="Quần Tây Ống Rộng" data-price="750000">
            <img src="hinhanh/quantay ống rộng.avif" alt="Quần Tây Ống Rộng">
            <h4>Quần Tây Ống Rộng</h4>
            <p class="price">750,000đ</p>
            <button class="add-to-cart">Thêm vào giỏ</button>
        </div>
    </div>
</section>

<div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-content">
        <div class="cart-header">
            <h3>Giỏ hàng</h3>
            <span id="close-cart" style="cursor:pointer; font-size: 24px;">&times;</span>
        </div>
        
        <div id="cart-items-list"></div> 
    </div>

    <div class="cart-footer">
        <div class="total-box">
            <span>Tổng cộng:</span>
            <span id="total-price">0đ</span>
        </div>
        <div class="checkout-form">
            <input type="text" id="customer-name" placeholder="Tên của bạn">
            <input type="tel" id="customer-phone" placeholder="Số điện thoại">
            <textarea id="customer-address" placeholder="Địa chỉ"></textarea>
            
            <button id="confirm-order" class="btn-checkout">XÁC NHẬN ĐẶT HÀNG</button>
        </div>
    </div>
</div>
<div id="overlay"></div>
    

</a>
<a href="links.html" class="floating-contact">
    <i class="fa-solid fa-link"></i> Liên hệ
</a>

<div id="product-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-body">
            <img id="modal-img" src="" alt="">
            <div class="modal-info">
                <h2 id="modal-name"></h2>
                <p id="modal-price"></p>
                <p id="modal-desc"></p> <button id="modal-add-btn">Thêm vào giỏ hàng</button>
            </div>
        </div>
    </div>
</div>
<div id="qr-container" style="display:none; text-align:center;">
    <img src="hinhanh/VietQR.png" width="250">
</div>
<script src="script.js"></script>
</body>
</html>
